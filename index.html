<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur Sécurité Pro</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; font-size: 1.3rem; cursor: pointer; user-select: none; }
        
        .product-preview { width: 100%; height: 180px; background: #fff; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #f1f5f9; }
        .product-preview img { width: 100%; height: 100%; object-fit: contain; }

        .comparison-box { margin-top: 10px; padding: 15px; border-radius: 15px; background: #fff5f5; border: 1px dashed #feb2b2; text-align: center; color: #c53030; font-size: 0.9rem; font-weight: 700; }
        .comparison-box span { text-decoration: line-through; opacity: 0.6; font-weight: 400; display: block; font-size: 0.75rem; margin-bottom: 5px; }

        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background-color: #fff; color: #1e293b; outline: none; -webkit-appearance: none; margin-bottom: 10px; }
        
        .specs { margin-top: 15px; font-size: 0.8rem; color: #475569; background: #f1f5f9; padding: 12px; border-radius: 15px; line-height: 1.5; }
        .specs b { color: #1e293b; display: block; margin-bottom: 3px; font-size: 0.75rem; }
        
        .result-box { margin-top: 15px; padding: 20px; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border-radius: 20px; text-align: center; color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); cursor: pointer; user-select: none; }
        .price-label { font-size: 0.8rem; opacity: 0.9; font-weight: 600; }
        .price-value { font-size: 2.4rem; font-weight: 800; margin: 2px 0; }
        .discount-badge { font-size: 0.7rem; background: rgba(255,255,255,0.3); padding: 2px 6px; border-radius: 5px; margin-left: 5px; }
        
        .btn-reset { display: block; width: 100%; background: #f1f5f9; border: none; color: #64748b; padding: 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .gain-secret { margin-top: 12px; color: #cbd5e1; font-size: 0.65rem; text-align: center; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title" onclick="toggleMode()">🛡️ Pack Sécurité Pro</h2>

    <div class="product-preview">
        <img id="product-img" src="detecteur.jpg" alt="Equipement">
    </div>

    <label>Équipement à configurer</label>
    <select id="modele" onchange="updateUI()">
        <option value="detecteur">Détecteur Ouverture</option>
        <option value="camera">Caméra Intelligente HD</option>
        <option value="sirene">Sirène Alarme 85dB</option>
    </select>

    <label id="label-qty">Nombre de détecteurs d'ouverture</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 unité</option>
        <option value="2">2 unités</option>
        <option value="3">3 unités</option>
        <option value="4">4 unités</option>
        <option value="5">5 unités</option>
        <option value="6">6 unités</option>
        <option value="7">7 unités</option>
        <option value="8">8 unités</option>
        <option value="9">9 unités</option>
        <option value="10">10 unités</option>
        <option value="11">11 unités</option>
        <option value="12">12 unités</option>
    </select>

    <div class="comparison-box">
        <span>Estimation Somfy (Matériel seul)</span>
        Commerce : <span id="somfy-v">180,00€</span>*
    </div>

    <div class="specs">
        <b>✅ MATÉRIEL & SERVICES INCLUS :</b>
        • 🎥 Caméra, 🚨 Sirène 85dB & 🚪 Détecteur d'ouv.<br>
        • Installation & Paramétrage complet<br>
        • Passerelle Zigbee | 🌐 <b>Wifi 2.4G requis</b>
    </div>

    <div class="result-box" onclick="applyDiscount()">
        <div class="price-label">
            <span id="price-desc">FORFAIT TOUT INCLUS</span>
            <span id="discount-val" class="discount-badge" style="display:none;">-0%</span>
        </div>
        <div id="total-v" class="price-value">119,00€</div>
    </div>
    
    <button class="btn-reset" onclick="resetAll()">🔄 RÉINITIALISER</button>
    <div id="gain-v" class="gain-secret">Ref: 81,00</div>
</div>

<script>
    let currentMode = 'pro'; 
    let discountLevel = 0; 

    // Ta grille Somfy (Caméra + IntelliTAGs)
    const somfyPrices = {
        1: 180, 2: 240, 3: 300, 4: 360, 5: 350, 6: 420, 
        7: 480, 8: 540, 9: 600, 10: 608, 11: 668, 12: 720
    };

    function resetAll() {
        currentMode = 'pro';
        discountLevel = 0;
        document.getElementById('modele').value = "detecteur";
        document.getElementById('quantite').value = "1";
        document.getElementById('price-desc').innerText = "FORFAIT TOUT INCLUS";
        document.getElementById('discount-val').style.display = 'none';
        updateUI();
    }

    function toggleMode() {
        currentMode = (currentMode === 'pro') ? 'ami' : 'pro';
        discountLevel = 0; 
        document.getElementById('price-desc').innerText = (currentMode === 'pro') ? "FORFAIT TOUT INCLUS" : "TARIF AMI (-50%)";
        updateUI();
    }

    function applyDiscount() {
        if (currentMode === 'pro') {
            discountLevel += 0.1;
            if (discountLevel > 0.31) discountLevel = 0; 
            const badge = document.getElementById('discount-val');
            badge.innerText = "-" + Math.round(discountLevel * 100) + "%";
            badge.style.display = (discountLevel > 0) ? 'inline-block' : 'none';
            updateUI();
        }
    }

    function updateUI() {
        const mod = document.getElementById('modele').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        const lbl = document.getElementById('label-qty');
        
        img.src = mod + '.jpg';

        if (mod === 'camera') lbl.innerText = "Nombre de caméras";
        else if (mod === 'detecteur') lbl.innerText = "Nombre de détecteurs d'ouverture";
        else if (mod === 'sirene') lbl.innerText = "Nombre de sirènes";

        // --- CALCUL SOMFY ---
        let prixSomfy = somfyPrices[qty];
        if (mod === 'camera') prixSomfy = (qty * 169) + 99;
        if (mod === 'sirene') prixSomfy = (qty * 149) + 99;
        document.getElementById('somfy-v').innerText = prixSomfy.toFixed(2).replace('.', ',') + "€";

        // --- TA LOGIQUE DE PRIX ---
        let totalVente = 119 + ((qty - 1) * 30);

        if (currentMode === 'ami') {
            totalVente = totalVente * 0.5;
        } else {
            totalVente = totalVente * (1 - discountLevel);
        }

        // --- CALCUL GAIN (REF) ---
        let achatU = 8; 
        if (mod === 'camera') achatU = 20;
        if (mod === 'sirene') achatU = 15;
        
        const totalCout = (qty * achatU) + 10;
        const totalGain = totalVente - totalCout;

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Ref: " + totalGain.toFixed(2).replace('.', ',');
    }

    window.onload = updateUI;
</script>

</body>
</html>
