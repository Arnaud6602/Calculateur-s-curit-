<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur Sécurité Pro</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; font-size: 1.3rem; cursor: pointer; user-select: none; }
        .product-preview { width: 100%; height: 200px; background: #fff; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-preview img { width: 100%; height: 100%; object-fit: contain; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background-color: #fff; color: #1e293b; margin-bottom: 5px; outline: none; -webkit-appearance: none; }
        
        .comparison-box { margin-top: 20px; padding: 12px; border-radius: 15px; background: #fff5f5; border: 1px dashed #feb2b2; text-align: center; color: #c53030; font-size: 0.85rem; font-weight: 600; }
        .comparison-box span { text-decoration: line-through; opacity: 0.7; font-weight: 400; }

        .specs { margin-top: 15px; font-size: 0.8rem; color: #475569; background: #f8fafc; padding: 12px; border-radius: 15px; border: 1px solid #e2e8f0; line-height: 1.4; }
        .specs b { color: #1e293b; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.7rem; }
        .wifi-tag { color: #2563eb; font-weight: bold; }
        
        .result-box { margin-top: 10px; padding: 20px; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border-radius: 20px; text-align: center; color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); cursor: pointer; user-select: none; }
        .price-label { font-size: 0.8rem; opacity: 0.9; font-weight: 600; }
        .price-value { font-size: 2.5rem; font-weight: 800; margin: 5px 0; }
        .discount-badge { font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }
        
        .gain-secret { margin-top: 15px; color: #cbd5e1; font-size: 0.65rem; text-align: center; width: 100%; font-family: monospace; }
        .btn-reset { display: block; width: 100%; background: none; border: none; color: #94a3b8; font-size: 0.7rem; text-decoration: underline; cursor: pointer; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title" onclick="toggleMode()">🛡️ Pack Sécurité</h2>

    <div class="product-preview">
        <img id="product-img" src="detecteur.jpg" alt="Produit">
    </div>

    <label>Équipement</label>
    <select id="modele" onchange="updateUI()">
        <option value="detecteur">Détecteur Ouverture</option>
        <option value="camera">Caméra Intelligente HD</option>
        <option value="sirene">Sirène Alarme 110dB</option>
    </select>

    <label>Nombre de détecteurs d'ouverture</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 unité</option>
        <option value="2">2 unités</option>
        <option value="3">3 unités</option>
        <option value="4">4 unités</option>
        <option value="5">5 unités</option>
        <option value="6">6 unités</option>
        <option value="7">7 unités</option>
        <option value="8">8 unités</option>
        <option value="10">10 unités</option>
        <option value="12">12 unités</option>
        <option value="15">15 unités</option>
    </select>

    <div class="comparison-box">
        Prix estimé Somfy : <span id="somfy-v">148,00€</span>*
        <div style="font-size: 0.6rem; font-weight: normal;">*Matériel seul (Link inclus), non installé</div>
    </div>

    <div class="specs">
        <b>🤖 Services Inclus :</b>
        ✅ Installation & Paramétrage complet<br>
        📡 Passerelle Zigbee incluse<br>
        🌐 <span class="wifi-tag">Wifi 2,4GHz nécessaire</span>
    </div>

    <div class="result-box" onclick="applyDiscount()">
        <div class="price-label">
            <span id="price-desc">Forfait TOUT INCLUS</span>
            <span id="discount-val" class="discount-badge" style="display:none;">-0%</span>
        </div>
        <div id="total-v" class="price-value">89,00€</div>
    </div>
    
    <button class="btn-reset" onclick="resetAll()">Réinitialiser</button>
    <div id="gain-v" class="gain-secret">Ref: 71,00</div>
</div>

<script>
    let currentMode = 'pro'; 
    let discountLevel = 0; 

    function resetAll() {
        currentMode = 'pro';
        discountLevel = 0;
        document.getElementById('modele').value = "detecteur";
        document.getElementById('quantite').value = "1";
        document.getElementById('price-desc').innerText = "Forfait TOUT INCLUS";
        document.getElementById('discount-val').style.display = 'none';
        updateUI();
    }

    function toggleMode() {
        currentMode = (currentMode === 'pro') ? 'ami' : 'pro';
        discountLevel = 0; 
        document.getElementById('price-desc').innerText = (currentMode === 'pro') ? "Forfait TOUT INCLUS" : "Tarif préférentiel";
        document.getElementById('discount-val').style.display = 'none';
        updateUI();
    }

    function applyDiscount() {
        if (currentMode === 'pro') {
            discountLevel += 0.1;
            if (discountLevel > 0.31) discountLevel = 0; 
            const badge = document.getElementById('discount-val');
            badge.innerText = "-" + Math.round(discountLevel * 100) + "%";
            badge.style.display = (discountLevel > 0) ? 'inline-block' : 'none';
            updateUI();
        }
    }

    function updateUI() {
        const mod = document.getElementById('modele').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        
        img.src = mod + '.jpg';

        let achatU = 8; 
        let venteU = (currentMode === 'pro') ? 89 : 45;
        let somfyU = 49; 
        let somfyLink = 99; 

        if (mod === 'camera') {
            achatU = 20;
            somfyU = 169;
        } else if (mod === 'sirene') {
            achatU = 15;
            somfyU = 149;
        }

        const totalSomfy = (qty * somfyU) + somfyLink;
        document.getElementById('somfy-v').innerText = totalSomfy.toFixed(2).replace('.', ',') + "€";

        if (currentMode === 'pro' && qty >= 5) venteU = venteU * 0.85; 
        if (currentMode === 'pro') venteU = venteU * (1 - discountLevel);

        const totalVente = qty * venteU;
        const totalGain = totalVente - (qty * achatU) - 10;

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Ref: " + totalGain.toFixed(2).replace('.', ',');
    }

    window.onload = updateUI;
</script>

</body>
</html>
