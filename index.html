<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur Sécurité Domotique</title>
    <style>
        :root { 
            --primary: #1e3a8a; 
            --bg: #f8fafc; 
            --accent: #2563eb;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid #e2e8f0; 
        }

        h2 { 
            text-align: center; 
            color: #1e293b; 
            margin-top: 0; 
            font-size: 1.3rem; 
            cursor: pointer; 
            user-select: none; 
        }

        .product-preview { 
            width: 100%; 
            height: 250px; 
            background: #fff; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        .product-preview img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        label { 
            display: block; 
            margin: 12px 0 5px; 
            font-weight: 600; 
            color: #64748b; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
        }

        select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 1rem; 
            background-color: #fff; 
            color: #1e293b; 
            margin-bottom: 5px; 
            outline: none; 
            -webkit-appearance: none; 
        }
        
        .specs { 
            margin-top: 20px; 
            font-size: 0.8rem; 
            color: #475569; 
            background: #f8fafc; 
            padding: 12px; 
            border-radius: 15px; 
            border: 1px solid #e2e8f0; 
            line-height: 1.4; 
        }

        .specs b { 
            color: #1e293b; 
            display: block; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
        }

        .warning { 
            font-size: 0.75rem; 
            color: #64748b; 
            margin-top: 5px; 
            font-style: italic; 
            border-top: 1px solid #eee; 
            padding-top: 5px; 
        }

        .btn-reset { 
            display: block; 
            width: 100%; 
            background: none; 
            border: none; 
            color: #94a3b8; 
            font-size: 0.7rem; 
            text-decoration: underline; 
            cursor: pointer; 
            margin-top: 15px; 
            text-align: center; 
        }

        .result-box { 
            margin-top: 5px; 
            padding: 20px; 
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); 
            border-radius: 20px; 
            text-align: center; 
            color: white; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); 
            cursor: pointer; 
            user-select: none; 
        }

        .price-label { 
            font-size: 0.8rem; 
            opacity: 0.9; 
            font-weight: 600; 
        }

        .price-value { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin: 5px 0; 
        }

        .discount-badge { 
            font-size: 0.7rem; 
            background: rgba(255,255,255,0.2); 
            padding: 2px 6px; 
            border-radius: 5px; 
            margin-left: 5px; 
            vertical-align: middle; 
        }
        
        .gain-secret { 
            margin-top: 15px; 
            color: #cbd5e1; 
            font-size: 0.65rem; 
            text-align: center; 
            width: 100%; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Cliquer sur le titre pour basculer Mode Pro / Mode Ami -->
    <h2 id="title" onclick="toggleMode()">🛡️ Pack Sécurité</h2>

    <div class="product-preview">
        <img id="product-img" src="detecteur.jpg" alt="Produit">
    </div>

    <label>Équipement</label>
    <select id="modele" onchange="updateUI()">
        <option value="detecteur">Détecteur Ouverture</option>
        <option value="camera">Caméra Intelligente HD</option>
        <option value="sirene">Sirène Alarme 110dB</option>
    </select>

    <!-- LIBELLÉ FIXE -->
    <label>Nombre de détecteurs d'ouverture</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 unité</option>
        <option value="2">2 unités</option>
        <option value="3">3 unités</option>
        <option value="4">4 unités</option>
        <option value="5">5 unités</option>
        <option value="6">6 unités</option>
        <option value="7">7 unités</option>
        <option value="8">8 unités</option>
        <option value="9">9 unités</option>
        <option value="10">10 unités</option>
        <option value="11">11 unités</option>
        <option value="12">12 unités</option>
        <option value="13">13 unités</option>
        <option value="14">14 unités</option>
        <option value="15">15 unités</option>
    </select>

    <div class="specs">
        <b>🤖 Services Inclus :</b>
        ✅ Installation & Paramétrage<br>
        📡 Passerelle Zigbee incluse<br>
        🔔 Alertes smartphone 24h/7j<br>
        🛡️ Mode Armement automatique
        <div class="warning">
            ⚠️ Wifi 2,4GHz nécessaire. Portée Zigbee optimisée par nos soins.
        </div>
    </div>

    <button class="btn-reset" onclick="resetAll()">Réinitialiser le pack</button>

    <!-- Cliquer sur le prix pour appliquer -10%, -20%, -30% (Mode Pro uniquement) -->
    <div class="result-box" onclick="applyDiscount()">
        <div class="price-label">
            <span id="price-desc">Forfait installation</span>
            <span id="discount-val" class="discount-badge" style="display:none;">-0%</span>
        </div>
        <div id="total-v" class="price-value">89,00€</div>
    </div>
    
    <div id="gain-v" class="gain-secret">Ref: 71,00</div>
</div>

<script>
    let currentMode = 'pro'; 
    let discountLevel = 0; 

    function resetAll() {
        currentMode = 'pro';
        discountLevel = 0;
        document.getElementById('modele').value = "detecteur";
        document.getElementById('quantite').value = "1";
        document.getElementById('price-desc').innerText = "Forfait installation";
        document.getElementById('discount-val').style.display = 'none';
        updateUI();
    }

    function toggleMode() {
        currentMode = (currentMode === 'pro') ? 'ami' : 'pro';
        discountLevel = 0; 
        document.getElementById('price-desc').innerText = (currentMode === 'pro') ? "Forfait installation" : "Tarif préférentiel";
        document.getElementById('discount-val').style.display = 'none';
        updateUI();
    }

    function applyDiscount() {
        if (currentMode === 'pro') {
            discountLevel += 0.1;
            if (discountLevel > 0.31) discountLevel = 0; 
            const badge = document.getElementById('discount-val');
            if (discountLevel > 0) {
                badge.innerText = "-" + Math.round(discountLevel * 100) + "%";
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            updateUI();
        }
    }

    function updateUI() {
        const mod = document.getElementById('modele').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        
        // Mise à jour de l'image
        img.src = mod + '.jpg';

        // Logique de prix Achat
        let achatU = 8; // Détecteur
        if (mod === 'camera') achatU = 20;
        else if (mod === 'sirene') achatU = 15;

        // Prix de vente de base
        let venteU = (currentMode === 'pro') ? 89 : 45;

        // Dégressif automatique -15% si 5 unités ou plus (Mode Pro)
        if (currentMode === 'pro' && qty >= 5) {
            venteU = venteU * 0.85;
        }

        // Application de la remise manuelle (clic sur prix bleu)
        if (currentMode === 'pro') {
            venteU = venteU * (1 - discountLevel);
        }

        const totalVente = qty * venteU;
        // Calcul du gain : Vente Totale - (Achat unitaire * quantité) - 10€ de passerelle
        const totalGain = totalVente - (qty * achatU) - 10;

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Ref: " + totalGain.toFixed(2).replace('.', ',');
    }

    // Lancer au chargement
    window.onload = updateUI;
</script>

</body>
</html>
